// Top-level build file where you can add configuration options common to all sub-projects/modules.
plugins {
    id 'com.android.application' version '8.8.0' apply false
    id 'org.jetbrains.kotlin.android' version '2.0.21' apply false
    id 'com.google.devtools.ksp' version '2.0.21-1.0.28' apply false
    id 'com.google.gms.google-services' version '4.3.15' apply false
}

def versionBase = (findProperty("cwVersionBase") ?: "7.1").toString()
def buildMoment = new Date()
def codeStamp = (System.currentTimeMillis() / 1000L).toLong()
def nameStamp = buildMoment.format("yyDDD.HHmmss")

ext.cwVersionCode = (findProperty("cwVersionCode") ?: codeStamp).toString().toInteger()
ext.cwVersionName = (findProperty("cwVersionName") ?: "${versionBase}.${nameStamp}").toString()

tasks.register('printVersionInfo') {
    group = 'help'
    description = 'Shows resolved ChildWatch versionName/versionCode for this build session.'
    doLast {
        println "ChildWatch versionName=${ext.cwVersionName}"
        println "ChildWatch versionCode=${ext.cwVersionCode}"
    }
}

// Guard against broken encodings in source/resources.
// Default mode reports suspicious files without breaking the build.
// Use -Putf8GuardStrict=true to fail the task while the cleanup is in progress.
def utf8SuspiciousRegexes = [
    [~/Ã./, "latin1 utf8 mojibake"],
    [~/Ð./, "latin1 cyrillic mojibake"],
    [~/Ñ./, "latin1 cyrillic mojibake"],
    [~/�/, "replacement character"],
    [~/вЂ./, "cp1252 punctuation mojibake"],
    [~/рџ./, "emoji mojibake"],
    [~/(?:Р.|С.){3,}/, "double-decoded cyrillic mojibake"],
]

tasks.register('utf8Guard') {
    group = 'verification'
    description = 'Scans sources for suspicious mojibake patterns.'
    doLast {
        def strict = ((findProperty("utf8GuardStrict") ?: "false").toString()).toBoolean()
        def trees = []
        trees += fileTree('.') {
            include 'app/src/**/*.kt', 'app/src/**/*.java', 'app/src/**/*.xml'
            include 'parentwatch/src/**/*.kt', 'parentwatch/src/**/*.java', 'parentwatch/src/**/*.xml'
            include 'server/**/*.js', 'server/**/*.ts', 'server/**/*.json'
            exclude '**/build/**', '**/.gradle/**', '**/.git/**'
        }
        def bad = []
        trees.each { f ->
            def text = f.getText('UTF-8')
            def match = utf8SuspiciousRegexes.find { entry -> (text =~ entry[0]).find() }
            if (match != null) {
                bad << "${f} [${match[1]}]"
            }
        }
        if (!bad.isEmpty()) {
            def message = "Potential encoding issues found in files:\n" +
                bad.join('\n') +
                "\nRun with -Putf8GuardStrict=true to fail the build."
            if (strict) {
                throw new GradleException(message)
            }
            logger.warn(message)
        } else {
            println 'UTF-8 guard passed.'
        }
    }
}

// Keep the report visible in the common verification cycle.
tasks.matching { it.name == 'check' }.configureEach {
    dependsOn tasks.named('utf8Guard')
}
